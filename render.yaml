services:
  - type: web
    name: interview-prep-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      # You must add these environment variables manually in the Render dashboard:
      # - key: MONGO_URI
      #   value: your_mongo_connection_string
      # - key: JWT_SECRET
        # value: your_jwt_secret
